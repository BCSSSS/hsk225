<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HSK Survival Quiz & Flashcard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        * { font-family: 'Inter', sans-serif; }

        .perspective { perspective: 1200px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface { backface-visibility: hidden; }
        .flip { transform: rotateY(180deg); }

        @keyframes shake {
            0%,100%{transform:translateX(0)} 15%{transform:translateX(-10px)}
            30%{transform:translateX(10px)} 45%{transform:translateX(-8px)}
            60%{transform:translateX(8px)} 75%{transform:translateX(-4px)} 90%{transform:translateX(4px)}
        }
        @keyframes pop-in {
            0%{transform:scale(0.85);opacity:0} 70%{transform:scale(1.04)} 100%{transform:scale(1);opacity:1}
        }
        @keyframes slide-up {
            0%{transform:translateY(18px);opacity:0} 100%{transform:translateY(0);opacity:1}
        }
        @keyframes blink {
            0%,100%{opacity:1} 50%{opacity:0.35}
        }
        @keyframes bar-shrink {
            from{width:100%} to{width:0%}
        }
        @keyframes heart-pop {
            0%{transform:scale(1)} 40%{transform:scale(1.5)} 100%{transform:scale(1)}
        }
        .shake { animation: shake 0.45s ease; }
        .pop-in { animation: pop-in 0.3s ease forwards; }
        .slide-up { animation: slide-up 0.35s ease forwards; }
        .blink { animation: blink 0.75s ease infinite; }
        .heart-pop { animation: heart-pop 0.4s ease; }

        .timer-bar {
            animation: bar-shrink linear forwards;
        }

        .glass {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .card-glow { box-shadow: 0 0 0 1px rgba(99,102,241,0.08), 0 8px 32px rgba(99,102,241,0.10); }
        .hc-glow { box-shadow: 0 0 0 1px rgba(220,38,38,0.10), 0 8px 32px rgba(220,38,38,0.12); }

        input[type=text] { -webkit-appearance: none; appearance: none; }
        body { background: linear-gradient(135deg, #eef2ff 0%, #f0fdf4 50%, #fdf4ff 100%); min-height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">

        const WORDS = [...WORDS_151_225];
        const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);

        // ══════════════════════════════════════════
        //   SUPABASE CONFIG
        // ══════════════════════════════════════════
        const SUPABASE_URL = 'https://zzqfxlqeytnllqovmtyb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_jhtae-PA_rMxuRzjshRaww_KeXH1eyy';
        const SB_HEADERS = {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
        };

        // Modifikasi: Ditambahkan limit=5 dan diurutkan langsung dari database Supabase agar lebih hemat bandwidth
        async function fetchLeaderboard() {
            try {
                const r = await fetch(`${SUPABASE_URL}/rest/v1/leaderboard?select=*&order=score.desc,time_used.asc&limit=5`, {
                    headers: SB_HEADERS
                });
                return await r.json();
            } catch(e) { return []; }
        }

        async function submitScore(name, mode, score, timeUsed) {
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/leaderboard`, {
                    method: 'POST',
                    headers: { ...SB_HEADERS, 'Prefer': 'return=minimal' },
                    body: JSON.stringify({ name, mode, score, time_used: timeUsed })
                });
            } catch(e) { console.error('Gagal save:', e); }
        }

        const cvtMobile = (t) => t
            .replace(/â/g,'ǎ').replace(/î/g,'ǐ').replace(/ô/g,'ǒ').replace(/û/g,'ǔ').replace(/ê/g,'ě')
            .replace(/Â/g,'Ǎ').replace(/Î/g,'Ǐ').replace(/Ô/g,'Ǒ').replace(/Û/g,'Ǔ').replace(/Ê/g,'Ě');

        const normPinyin = (t) => cvtMobile(t.trim().toLowerCase().replace(/\s+/g,' '));

        const normMeaning = (t) => t.toLowerCase().trim()
            .replace(/[áǎàā]/g,'a').replace(/[éěèē]/g,'e')
            .replace(/[íǐìī]/g,'i').replace(/[óǒòō]/g,'o').replace(/[úǔùū]/g,'u');

        // ══════════════════════════════════════════
        //   LOGIN SCREEN
        // ══════════════════════════════════════════
        function LoginScreen({ onLogin }) {
            const [inputName, setInputName] = useState('');
            const [leaderboard, setLeaderboard] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                fetchLeaderboard().then(data => {
                    setLeaderboard(Array.isArray(data) ? data : []);
                    setLoading(false);
                });
            }, []);

            const getTop5 = (mode) => {
                return leaderboard.filter(e => e.mode === mode);
            };

            const medals = ['🥇','🥈','🥉','4️⃣','5️⃣'];
            const fmtTime = (s) => s != null ? `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}` : '-';

            const LeaderTable = ({mode, label, color}) => {
                const rows = getTop5(mode);
                return (
                    <div style={{marginBottom:16,background:'rgba(255,255,255,0.7)',backdropFilter:'blur(12px)',borderRadius:18,padding:'14px 14px 10px',boxShadow:'0 2px 16px rgba(0,0,0,0.06)'}}>
                        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:10}}>
                            <span style={{fontSize:14,fontWeight:900,color}}>{label}</span>
                            <span style={{fontSize:10,color:'#94a3b8',fontWeight:600}}>TOP 5</span>
                        </div>
                        {loading ? (
                            <p style={{fontSize:12,color:'#94a3b8',textAlign:'center',margin:'8px 0'}}>Memuat...</p>
                        ) : rows.length === 0 ? (
                            <p style={{fontSize:12,color:'#94a3b8',textAlign:'center',margin:'8px 0'}}>Belum ada data</p>
                        ) : (
                            <div>
                                <div style={{display:'grid',gridTemplateColumns:'24px 1fr 44px 44px',gap:4,marginBottom:4}}>
                                    <span style={{fontSize:9,color:'#94a3b8',fontWeight:700}}>#</span>
                                    <span style={{fontSize:9,color:'#94a3b8',fontWeight:700}}>NAMA</span>
                                    <span style={{fontSize:9,color:'#94a3b8',fontWeight:700,textAlign:'right'}}>NILAI</span>
                                    <span style={{fontSize:9,color:'#94a3b8',fontWeight:700,textAlign:'right'}}>WAKTU</span>
                                </div>
                                {rows.map((e,i) => (
                                    <div key={i} style={{display:'grid',gridTemplateColumns:'24px 1fr 44px 44px',gap:4,padding:'5px 0',borderTop:'1px solid rgba(0,0,0,0.05)'}}>
                                        <span style={{fontSize:14}}>{medals[i]}</span>
                                        <span style={{fontSize:12,fontWeight:700,color:'#1e1b4b',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.name}</span>
                                        <span style={{fontSize:12,fontWeight:800,color,textAlign:'right'}}>{e.score}</span>
                                        <span style={{fontSize:11,color:'#64748b',textAlign:'right'}}>{fmtTime(e.time_used)}</span>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                );
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (inputName.trim()) {
                    onLogin(inputName.trim());
                }
            };

            return (
                <div style={{minHeight:'100vh',padding:'16px 12px 48px'}}>
                    <div style={{maxWidth:480,margin:'0 auto'}}>
                        {/* Header */}
                        <div style={{textAlign:'center',marginBottom:24}}>
                            <div style={{display:'inline-flex',alignItems:'center',gap:8,background:'rgba(255,255,255,0.6)',backdropFilter:'blur(12px)',border:'1px solid rgba(99,102,241,0.15)',borderRadius:999,padding:'6px 18px',marginBottom:12}}>
                                <span style={{fontSize:18}}>🈶</span>
                                <span style={{fontSize:12,fontWeight:800,letterSpacing:2,color:'#6366f1',textTransform:'uppercase'}}>HSK Survival</span>
                            </div>
                            <h1 style={{fontSize:28,fontWeight:900,color:'#1e1b4b',margin:0,lineHeight:1.1}}>Quiz & Flashcard</h1>
                            <p style={{fontSize:13,color:'#818cf8',fontWeight:600,margin:'4px 0 0'}}>No. 151 – 225 · Mandarin × Indonesia</p>
                        </div>

                        {/* Login Bebas Nama */}
                        <div style={{background:'rgba(255,255,255,0.75)',backdropFilter:'blur(12px)',borderRadius:22,padding:'20px 16px',marginBottom:20,boxShadow:'0 2px 20px rgba(99,102,241,0.10)'}}>
                            <p style={{fontSize:13,fontWeight:800,color:'#1e1b4b',marginBottom:12,letterSpacing:1}}>👤 MASUKKAN NAMA KAMU</p>

                                    type="text" 
                                    value={inputName}
                                    onChange={(e) => setInputName(e.target.value)}

                                    style={{
                                        width: '100%', padding: '12px 14px', borderRadius: 14,
                                        border: '1px solid rgba(99,102,241,0.2)', background: 'rgba(255,255,255,0.9)',
                                        color: '#1e1b4b', fontWeight: 700, fontSize: 14, marginBottom: 14,
                                        boxShadow: '0 1px 4px rgba(0,0,0,0.05)', outline: 'none'
                                    }}
                                />
                                <button type="submit" disabled={!inputName.trim()} style={{
                                    width:'100%', padding:'14px', border:'none', cursor: inputName.trim() ? 'pointer' : 'not-allowed',
                                    background: inputName.trim() ? 'linear-gradient(135deg,#6366f1,#4f46e5)' : '#e2e8f0',
                                    color: inputName.trim() ? '#fff' : '#94a3b8', borderRadius:14,
                                    fontWeight:800, fontSize:15,
                                    boxShadow: inputName.trim() ? '0 4px 16px rgba(99,102,241,0.35)' : 'none',
                                    transition:'all 0.2s',
                                }}>
                                    {inputName.trim() ? `Masuk sebagai ${inputName.trim()} →` : 'Ketik nama dulu...'}
                                </button>
                            </form>
                        </div>

                        {/* Leaderboard */}
                        <p style={{fontSize:11,fontWeight:800,color:'#64748b',letterSpacing:2,marginBottom:12,textTransform:'uppercase'}}>🏆 Leaderboard</p>
                        <LeaderTable mode="quiz" label="📝 Quiz" color="#059669" />
                        <LeaderTable mode="hardcore" label="💀 Hardcore" color="#dc2626" />
                        <LeaderTable mode="blind" label="🧠 Blind" color="#d97706" />
                    </div>
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [mode, setMode] = useState('flashcard');
            const [session, setSession] = useState(0);

            if (!user) return <LoginScreen onLogin={setUser} />;

            return (
                <div style={{minHeight:'100vh', padding:'16px 12px 48px'}}>
                    <div style={{maxWidth:480,margin:'0 auto'}}>
                        {/* ── HEADER ── */}
                        <div style={{textAlign:'center',marginBottom:24}}>
                            <div style={{display:'inline-flex',alignItems:'center',gap:8,background:'rgba(255,255,255,0.6)',backdropFilter:'blur(12px)',border:'1px solid rgba(99,102,241,0.15)',borderRadius:999,padding:'6px 18px',marginBottom:12}}>
                                <span style={{fontSize:18}}>🈶</span>
                                <span style={{fontSize:12,fontWeight:800,letterSpacing:2,color:'#6366f1',textTransform:'uppercase'}}>HSK Survival</span>
                                <span style={{fontSize:11,color:'#94a3b8',fontWeight:600}}>·</span>
                                <span style={{fontSize:11,fontWeight:700,color:'#6366f1'}}>{user}</span>
                                <button onClick={() => setUser(null)} style={{fontSize:10,color:'#94a3b8',background:'none',border:'none',cursor:'pointer',fontWeight:600,padding:'2px 4px'}}>✕</button>
                            </div>
                            <h1 style={{fontSize:28,fontWeight:900,color:'#1e1b4b',margin:0,lineHeight:1.1}}>Quiz & Flashcard</h1>
                            <p style={{fontSize:13,color:'#818cf8',fontWeight:600,margin:'4px 0 0'}}>No. 151 – 225 · Mandarin × Indonesia</p>
                        </div>

                        {/* ── TAB ── */}
                        <div style={{display:'flex',gap:6,background:'rgba(255,255,255,0.55)',backdropFilter:'blur(8px)',border:'1px solid rgba(255,255,255,0.8)',borderRadius:20,padding:6,marginBottom:20,boxShadow:'0 2px 16px rgba(99,102,241,0.08)'}}>
                            {[
                                ['flashcard','🃏','Flashcard','#6366f1'],
                                ['quiz','📝','Quiz','#059669'],
                                ['hardcore','💀','Hardcore','#dc2626'],
                                ['blind','🧠','Blind','#d97706'],
                            ].map(([m, icon, label, color]) => (
                                <button key={m} onClick={() => setMode(m)} style={{
                                    flex:1, padding:'10px 2px', border:'none', cursor:'pointer',
                                    borderRadius:14, fontWeight:800, fontSize:10, transition:'all 0.2s',
                                    background: mode===m ? color : 'transparent',
                                    color: mode===m ? '#fff' : '#64748b',
                                    boxShadow: mode===m ? `0 4px 12px ${color}44` : 'none',
                                    display:'flex', flexDirection:'column', alignItems:'center', gap:2,
                                }}>
                                    <span style={{fontSize:16}}>{icon}</span>
                                    {label}
                                </button>
                            ))}
                        </div>

                        {/* ── KONTEN ── */}
                        {mode === 'flashcard' && <Flashcard session={session} setSession={setSession} />}
                        {mode === 'quiz' && <QuizMode user={user} />}
                        {mode === 'hardcore' && <HardcoreMode user={user} />}
                        {mode === 'blind' && <BlindRecallMode user={user} />}
                    </div>
                </div>
            );
        }

        // ══════════════════════════════════════════
        //   FLASHCARD
        // ══════════════════════════════════════════
        function Flashcard({ session, setSession }) {
            const [isShuffled, setIsShuffled] = useState(false);
            const [shuffledList, setShuffledList] = useState([]);

            const getBase = (s) => {
                const third = Math.ceil(WORDS.length / 3);
                if (s === 0) return WORDS;
                if (s === 1) return WORDS.slice(0, third);
                if (s === 2) return WORDS.slice(third, third * 2);
                return WORDS.slice(third * 2);
            };

            const list = isShuffled ? shuffledList : getBase(session);
            const [idx, setIdx] = useState(0);
            const [flipped, setFlipped] = useState(false);
            const [done, setDone] = useState(false);

            useEffect(() => { setIdx(0); setFlipped(false); setDone(false); }, [session, isShuffled]);

            const toggleShuffle = () => {
                const newShuffled = shuffle([...getBase(session)]);
                setShuffledList(newShuffled);
                setIsShuffled(p => !p);
            };

            const cur = list[idx] || WORDS[0];
            const progress = ((idx + 1) / list.length) * 100;

            if (done) return (
                <Card>
                    <div style={{textAlign:'center',padding:'24px 0'}}>
                        <div style={{fontSize:56,marginBottom:8}}>🎉</div>
                        <h2 style={{fontSize:22,fontWeight:900,color:'#1e1b4b',margin:'0 0 4px'}}>Sesi Selesai!</h2>
                        <p style={{color:'#94a3b8',fontSize:13,marginBottom:24}}>Semua {list.length} kartu sudah ditinjau</p>
                        <Btn color="#6366f1" onClick={() => { setIdx(0); setFlipped(false); setDone(false); }}>Ulangi Sesi</Btn>
                    </div>
                </Card>
            );

            return (
                <>
                <div style={{marginBottom:12}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                        <p style={{fontSize:11,fontWeight:700,color:'#94a3b8',letterSpacing:2,textTransform:'uppercase',margin:0}}>Sesi Belajar</p>
                        <button onClick={toggleShuffle} style={{
                            display:'flex', alignItems:'center', gap:5,
                            background: isShuffled ? '#6366f1' : 'rgba(255,255,255,0.6)',
                            border: `1px solid ${isShuffled ? '#6366f1' : 'rgba(99,102,241,0.2)'}`,
                            borderRadius:10, padding:'5px 10px', cursor:'pointer',
                            fontSize:11, fontWeight:800,
                            color: isShuffled ? '#fff' : '#818cf8',
                            transition:'all 0.2s',
                        }}>
                            🔀 {isShuffled ? 'Diacak' : 'Urut'}
                        </button>
                    </div>
                    <div style={{display:'flex',gap:5,background:'rgba(255,255,255,0.5)',border:'1px solid rgba(99,102,241,0.12)',borderRadius:14,padding:5}}>
                        {[['Semua',0],['Sesi 1',1],['Sesi 2',2],['Sesi 3',3]].map(([l,s]) => (
                            <button key={s} onClick={() => setSession(s)} style={{
                                flex:1, padding:'7px 0', border:'none', cursor:'pointer', borderRadius:10,
                                fontWeight:800, fontSize:11,
                                background: session===s ? '#6366f1' : 'transparent',
                                color: session===s ? '#fff' : '#818cf8',
                                boxShadow: session===s ? '0 2px 8px #6366f144' : 'none',
                                transition:'all 0.18s',
                            }}>{l}</button>
                        ))}
                    </div>
                </div>

                <Card>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
                        <span style={{fontSize:11,fontWeight:700,color:'#c7d2fe',letterSpacing:2,textTransform:'uppercase'}}>Kartu</span>
                        <span style={{fontSize:12,fontWeight:800,color:'#6366f1'}}>{idx+1} / {list.length}</span>
                    </div>
                    <div style={{height:4,background:'#eef2ff',borderRadius:99,marginBottom:24,overflow:'hidden'}}>
                        <div style={{height:'100%',borderRadius:99,background:'linear-gradient(90deg,#6366f1,#a78bfa)',width:`${progress}%`,transition:'width 0.4s ease'}} />
                    </div>

                    <div onClick={() => setFlipped(!flipped)} style={{cursor:'pointer',perspective:1200,height:220,marginBottom:24}}>
                        <div style={{
                            width:'100%', height:'100%', position:'relative',
                            transformStyle:'preserve-3d', transition:'transform 0.5s cubic-bezier(.4,0,.2,1)',
                            transform: flipped ? 'rotateY(180deg)' : 'rotateY(0)',
                        }}>
                            <div style={{
                                position:'absolute', inset:0, backfaceVisibility:'hidden',
                                background:'linear-gradient(135deg,#f0f4ff 0%,#fafbff 100%)',
                                borderRadius:20, border:'1px solid rgba(99,102,241,0.12)',
                                display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
                                boxShadow:'0 4px 24px rgba(99,102,241,0.08)',
                            }}>
                                <div style={{fontSize:72,fontWeight:900,color:'#1e1b4b',lineHeight:1,marginBottom:12}}>{cur[0]}</div>
                                <div style={{fontSize:11,fontWeight:700,color:'#c7d2fe',letterSpacing:2,textTransform:'uppercase'}}>TAP UNTUK MELIHAT ARTI</div>
                            </div>
                            <div style={{
                                position:'absolute', inset:0, backfaceVisibility:'hidden',

        // ══════════════════════════════════════════
        //   QUIZ MODE
        // ══════════════════════════════════════════
        function QuizMode({ user }) {
            const [isShuffled, setIsShuffled] = useState(false);
            const [list, setList] = useState(WORDS);
            const [idx, setIdx] = useState(0);
            const [pinyin, setPinyin] = useState('');
            const [meaning, setMeaning] = useState('');
            const [score, setScore] = useState(0);
            const [answered, setAnswered] = useState({});
            const [wrongList, setWrongList] = useState([]);
            const [showResult, setShowResult] = useState(false);
            const [finished, setFinished] = useState(false);
            const [timerMode, setTimerMode] = useState(2700);
            const [timeLeft, setTimeLeft] = useState(2700);
            const [started, setStarted] = useState(false);
            const [flash, setFlash] = useState(null);
            const inputRef = useRef(null);

            useEffect(() => {
                if (!started || finished || timeLeft <= 0) {
                    if (timeLeft <= 0) setFinished(true);
                    return;
                }
                const t = setInterval(() => setTimeLeft(p => p - 1), 1000);
                return () => clearInterval(t);
            }, [started, finished, timeLeft]);

            const cur = list[idx] || WORDS[0];
            const danger = timeLeft <= 300;
            const fmtTime = (s) => `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
            const progress = ((idx) / list.length) * 100;
            const maxScore = list.length * 2;

            const checkAnswer = () => {
                if (!started) setStarted(true);
                if (showResult) return;

                let earned = 0;
                const userP = normPinyin(pinyin);
                const correctP = normPinyin(cur[1]);
                const pinyinOk = userP === correctP;
                if (pinyin.trim() !== '' && pinyinOk) earned++;

                const meaningOk = meaning.trim() !== '' && (
                    normMeaning(cur[2]).includes(normMeaning(meaning)) ||
                    normMeaning(meaning).includes(normMeaning(cur[2]))
                );
                if (meaningOk) earned++;

                setScore(p => p + earned);
                const allCorrect = pinyinOk && meaningOk;
                setFlash(allCorrect ? 'correct' : 'wrong');
                setTimeout(() => setFlash(null), 600);

                if (!allCorrect) setWrongList(p => [...p, { hanzi: cur[0], pinyin: cur[1], meaning: cur[2] }]);
                setAnswered(p => ({ ...p, [idx]: { pinyin: cur[1], meaning: cur[2], pinyinOk, meaningOk } }));
                setShowResult(true);
            };

            const nextQ = () => {
                setShowResult(false);
                setPinyin('');
                setMeaning('');
                if (idx + 1 >= list.length) setFinished(true);
                else {
                    setIdx(p => p + 1);
                    setTimeout(() => inputRef.current?.focus(), 50);
                }
            };

            const changeTimer = (secs) => {
                if (started) return;
                setTimerMode(secs);
                setTimeLeft(secs);
            };

            const toggleShuffle = () => {
                const newList = !isShuffled ? shuffle([...WORDS]) : WORDS;
                setList(newList);
                setIsShuffled(p => !p);
                setIdx(0); setPinyin(''); setMeaning(''); setScore(0);
                setAnswered({}); setWrongList([]); setShowResult(false); setFinished(false);
                setTimeLeft(timerMode); setStarted(false);
            };

            const finalScore = Math.round((score / maxScore) * 100);
            const timeUsed = timerMode - timeLeft;
            const [submitted, setSubmitted] = useState(false);

            useEffect(() => {
                if (finished && user && !submitted) {
                    setSubmitted(true);
                    submitScore(user, 'quiz', finalScore, timeUsed);
                }
            }, [finished]);

            if (finished) return (
                <FinishScreen score={finalScore} label="Quiz" color="#059669" extra={started ? `Waktu: ${fmtTime(timeUsed)}` : ''} wrongList={wrongList} onRetry={() => {
                    const newList = isShuffled ? shuffle([...WORDS]) : WORDS;
                    setList(newList);
                    setIdx(0); setPinyin(''); setMeaning(''); setScore(0);
                    setAnswered({}); setWrongList([]); setShowResult(false); setFinished(false);
                    setTimeLeft(timerMode); setStarted(false); setSubmitted(false);
                }} />
            );

            return (
                <>
                <div style={{display:'flex',gap:8,marginBottom:14}}>
                    <button onClick={toggleShuffle} style={{
                        display:'flex', alignItems:'center', gap:5, flexShrink:0,
                        background: isShuffled ? '#059669' : 'rgba(255,255,255,0.7)',
                        border: `1px solid ${isShuffled ? '#059669' : 'rgba(16,185,129,0.25)'}`,
                        borderRadius:12, padding:'10px 12px', cursor:'pointer',
                        fontSize:11, fontWeight:800, color: isShuffled ? '#fff' : '#059669',
                        backdropFilter:'blur(8px)', transition:'all 0.2s',
                    }}>
                        🔀 {isShuffled ? 'Diacak' : 'Urut'}
                    </button>
                    <div style={{
                        flex:1, display:'flex', alignItems:'center', gap:6,
                        background: danger ? 'rgba(254,226,226,0.8)' : 'rgba(236,253,245,0.8)',
                        border: `1px solid ${danger ? '#fca5a5' : '#a7f3d0'}`, borderRadius:12, padding:'8px 12px',
                    }}>
                        <span style={{fontSize:11,fontWeight:700,color:danger?'#dc2626':'#047857'}}>⏱️ WAKTU</span>
                        <div style={{display:'flex',gap:4,marginLeft:'auto'}}>
                            {[2700, 3600].map(s => (
                                <button key={s} onClick={() => changeTimer(s)} disabled={started} style={{
                                    border:'none', background: timerMode===s ? (danger?'#dc2626':'#059669') : 'transparent',
                                    color: timerMode===s ? '#fff' : (danger?'#ef4444':'#10b981'),
                                    fontSize:10, fontWeight:800, padding:'3px 6px', borderRadius:6, cursor: started ? 'default' : 'pointer'
                                }}>{s/60}m</button>
                            ))}
                        </div>
                        <span style={{fontSize:14,fontWeight:900,fontFamily:'monospace',color:danger?'#dc2626':'#047857'}}>{fmtTime(timeLeft)}</span>
                    </div>
                </div>

                <Card flash={flash}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
                        <span style={{fontSize:11,fontWeight:700,color:'#a7f3d0',letterSpacing:2}}>PROGRES</span>
                        <span style={{fontSize:12,fontWeight:800,color:'#059669'}}>{idx+1} / {list.length}</span>
                    </div>
                    <div style={{height:4,background:'#eef2ff',borderRadius:99,marginBottom:24,overflow:'hidden'}}>
                        <div style={{height:'100%',background:'linear-gradient(90deg,#059669,#34d399)',width:`${progress}%`,transition:'width 0.3s ease'}} />
                    </div>

                    <div style={{textAlign:'center',marginBottom:24}}>
                        <div style={{fontSize:80,fontWeight:900,color:'#1e1b4b',lineHeight:1}}>{cur[0]}</div>
                    </div>

                    <div style={{display:'flex',flexDirection:'column',gap:12,marginBottom:20}}>
                        <div>
                            <label style={{display:'block',fontSize:10,fontWeight:800,color:'#64748b',marginBottom:4,letterSpacing:1}}>PINYIN (NADA TEPAT: à í ǒ ū)</label>
                            <input ref={inputRef} type="text" value={pinyin} onChange={e=>setPinyin(e.target.value)} disabled={showResult} placeholder="Contoh: nǚ péng you" style={{width:'100%',padding:'12px',borderRadius:12,border:'1px solid #cbd5e1',outline:'none',fontSize:14,fontWeight:600}} />
                        </div>
                        <div>
                            <label style={{display:'block',fontSize:10,fontWeight:800,color:'#64748b',marginBottom:4,letterSpacing:1}}>ARTI INDONESIA</label>
                            <input type="text" value={meaning} onChange={e=>setMeaning(e.target.value)} disabled={showResult} placeholder="Contoh: pacar" style={{width:'100%',padding:'12px',borderRadius:12,border:'1px solid #cbd5e1',outline:'none',fontSize:14,fontWeight:600}} />
                        </div>
                    </div>

                    {showResult ? (
                        <div style={{background:'#f8fafc',borderRadius:14,padding:12,marginBottom:20,border:'1px solid #e2e8f0'}}>
                            <div style={{marginBottom:6}}>
                                <span style={{fontSize:10,fontWeight:800,color:'#94a3b8',display:'block'}}>KUNCI PINYIN</span>
                                <span style={{fontSize:15,fontWeight:800,color:answered[idx]?.pinyinOk?'#059669':'#dc2626'}}>{cur[1]} {answered[idx]?.pinyinOk?'✓':'✗'}</span>
                            </div>
                            <div>
                                <span style={{fontSize:10,fontWeight:800,color:'#94a3b8',display:'block'}}>KUNCI ARTI</span>
                                <span style={{fontSize:15,fontWeight:800,color:answered[idx]?.meaningOk?'#059669':'#dc2626'}}>{cur[2]} {answered[idx]?.meaningOk?'✓':'✗'}</span>
                            </div>
                            <button onClick={nextQ} style={{width:'100%',marginTop:12,padding:'12px',background:'#1e1b4b',color:'#fff',border:'none',borderRadius:10,fontWeight:800,fontSize:13,cursor:'pointer'}}>Lanjut ➔</button>
                        </div>
                    ) : (
                        <button onClick={checkAnswer} style={{width:'100%',padding:'14px',background:'linear-gradient(135deg,#059669,#10b981)',color:'#fff',border:'none',borderRadius:14,fontWeight:800,fontSize:14,cursor:'pointer',boxShadow:'0 4px 12px rgba(16,185,129,0.25)'}}>Periksa Jawaban</button>
                    )}
                </Card>
                </>
            );
        }

        // ══════════════════════════════════════════
        //   HARDCORE MODE
        // ══════════════════════════════════════════
        function HardcoreMode({ user }) {
            const [list, setList] = useState([]);
            const [idx, setIdx] = useState(0);
            const [pinyin, setPinyin] = useState('');
            const [meaning, setMeaning] = useState('');
            const [lives, setLives] = useState(3);
            const [score, setScore] = useState(0);
            const [showResult, setShowResult] = useState(false);
            const [finished, setFinished] = useState(false);
            const [flash, setFlash] = useState(null);
            const [wrongList, setWrongList] = useState([]);
            const [combo, setCombo] = useState(0);
            const [maxCombo, setMaxCombo] = useState(0);
            const [timeLeft, setTimeLeft] = useState(8);
            const inputRef = useRef(null);

            useEffect(() => {
                setList(shuffle([...WORDS]));
            }, []);

            useEffect(() => {
                if (finished || showResult || list.length === 0) return;
                if (timeLeft <= 0) {
                    handleTimeout();
                    return;
                }
                const t = setInterval(() => setTimeLeft(p => p - 1), 1000);
                return () => clearInterval(t);
            }, [timeLeft, showResult, finished, list]);

            const cur = list[idx] || ['','',''];

            const handleTimeout = () => {
                setFlash('wrong');
                setTimeout(() => setFlash(null), 600);
                setWrongList(p => [...p, { hanzi: cur[0], pinyin: cur[1], meaning: cur[2], info: 'Waktu Habis' }]);
                setCombo(0);
                const nextLives = lives - 1;
                setLives(nextLives);
                setShowResult(true);
                if (nextLives <= 0) setFinished(true);
            };

            const checkAnswer = () => {
                if (showResult) return;
                const userP = normPinyin(pinyin);
                const correctP = normPinyin(cur[1]);
                const pinyinOk = userP === correctP;

                const meaningOk = meaning.trim() !== '' && (
                    normMeaning(cur[2]).includes(normMeaning(meaning)) ||
                    normMeaning(meaning).includes(normMeaning(cur[2]))
                );

                const correct = pinyinOk && meaningOk;
                setFlash(correct ? 'correct' : 'wrong');
                setTimeout(() => setFlash(null), 600);

                if (correct) {
                    setScore(p => p + 1);
                    const newCombo = combo + 1;
                    setCombo(newCombo);
                    if (newCombo > maxCombo) setMaxCombo(newCombo);
                } else {
                    setWrongList(p => [...p, { hanzi: cur[0], pinyin: cur[1], meaning: cur[2] }]);
                    setCombo(0);
                    const nextLives = lives - 1;
                    setLives(nextLives);
                    if (nextLives <= 0) {
                        setFinished(true);
                        return;
                    }
                }
                setShowResult(true);
            };

            const nextQ = () => {
                setShowResult(false); setPinyin(''); setMeaning(''); setTimeLeft(8);
                if (idx + 1 >= list.length) setFinished(true);
                else {
                    setIdx(p => p + 1);
                    setTimeout(() => inputRef.current?.focus(), 50);
                }
            };

            const [submitted, setSubmitted] = useState(false);
            useEffect(() => {
                if (finished && user && !submitted) {
                    setSubmitted(true);
                    submitScore(user, 'hardcore', score, maxCombo);
                }
            }, [finished]);

            if (finished) return (
                <FinishScreen score={score} label="Hardcore" color="#dc2626" extra={`Max Combo: ${maxCombo}x`} wrongList={wrongList} onRetry={() => {
                    setList(shuffle([...WORDS])); setIdx(0); setPinyin(''); setMeaning('');
                    setLives(3); setScore(0); setShowResult(false); setFinished(false);
                    setCombo(0); setMaxCombo(0); setTimeLeft(8); setSubmitted(false);
                }} />
            );

            return (
                <Card flash={flash} hardcore>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
                        <div style={{display:'flex',gap:4}}>
                            {Array.from({length:3}).map((_,i) => (
                                <span key={i} style={{fontSize:16,filter: i<lives?'none':'grayscale(100%) opacity(0.3)',transition:'all 0.3s',display:'inline-block'}} className={i===lives-1&&timeLeft<=3?'blink':''}>❤️</span>
                            ))}
                        </div>
                        <div style={{textAlign:'right'}}>
                            <span style={{fontSize:11,fontWeight:800,color:'#fca5a5',display:'block',letterSpacing:1}}>SKOR: {score}</span>
                            {combo > 1 && <span style={{fontSize:10,fontWeight:900,color:'#f43f5e'}} className="heart-pop">{combo}x Combo! 🔥</span>}
                        </div>
                    </div>

                    <div style={{height:6,background:'rgba(255,255,255,0.2)',borderRadius:99,marginBottom:20,overflow:'hidden',position:'relative'}}>
                        {!showResult && (
                            <div key={idx+'-'+timeLeft} className="timer-bar" style={{height:'100%',background:timeLeft<=3?'#ef4444':'#fff',animationDuration:`${timeLeft}s`}} />
                        )}
                    </div>

                    <div style={{textAlign:'center',marginBottom:20}}>
                        <div style={{fontSize:84,fontWeight:900,color:'#fff',lineHeight:1}}>{cur[0]}</div>
                    </div>

                    <div style={{display:'flex',flexDirection:'column',gap:12,marginBottom:20}}>
                        <input ref={inputRef} type="text" value={pinyin} onChange={e=>setPinyin(e.target.value)} disabled={showResult} placeholder="Pinyin tepat (à í ǒ ū)..." style={{width:'100%',padding:'12px',borderRadius:12,border:'none',fontSize:14,fontWeight:600,background:'rgba(255,255,255,0.95)'}} />
                        <input type="text" value={meaning} onChange={e=>setMeaning(e.target.value)} disabled={showResult} placeholder="Arti Indonesia..." style={{width:'100%',padding:'12px',borderRadius:12,border:'none',fontSize:14,fontWeight:600,background:'rgba(255,255,255,0.95)'}} />
                    </div>

                    {showResult ? (
                        <div style={{background:'rgba(0,0,0,0.2)',borderRadius:14,padding:12,marginBottom:20,border:'1px solid rgba(255,255,255,0.1)'}}>
                            <div style={{marginBottom:6}}><span style={{fontSize:10,fontWeight:800,color:'#fca5a5',display:'block'}}>PINYIN</span><span style={{fontSize:16,fontWeight:800,color:'#fff'}}>{cur[1]}</span></div>
                            <div><span style={{fontSize:10,fontWeight:800,color:'#fca5a5',display:'block'}}>ARTI</span><span style={{fontSize:16,fontWeight:800,color:'#a7f3d0'}}>{cur[2]}</span></div>
                            <button onClick={nextQ} style={{width:'100%',marginTop:12,padding:'12px',background:'#fff',color:'#dc2626',border:'none',borderRadius:10,fontWeight:800,fontSize:13,cursor:'pointer'}}>Lanjut ➔</button>
                        </div>
                    ) : (
                        <button onClick={checkAnswer} style={{width:'100%',padding:'14px',background:'#fff',color:'#dc2626',border:'none',borderRadius:14,fontWeight:800,fontSize:14,cursor:'pointer',boxShadow:'0 4px 12px rgba(0,0,0,0.15)'}}>Jawab secepatnya!</button>
                    )}
                </Card>
            );
        }

                            <div style={{marginBottom:6}}><span style={{fontSize:10,fontWeight:800,color:'#fef3c7',display:'block'}}>PINYIN SEBENARNYA</span><span style={{fontSize:16,fontWeight:800,color:'#fff'}}>{cur[1]}</span></div>
                            <div style={{marginBottom:6}}><span style={{fontSize:10,fontWeight:800,color:'#fef3c7',display:'block'}}>ARTI SEBENARNYA</span><span style={{fontSize:16,fontWeight:800,color:'#a7f3d0'}}>{cur[2]}</span></div>
                            <div><span style={{fontSize:10,fontWeight:800,color:'#fef3c7',display:'block'}}>HANZI</span><span style={{fontSize:24,fontWeight:900,color:'#fff'}}>{cur[0]}</span></div>
                            <button onClick={nextQ} style={{width:'100%',marginTop:12,padding:'12px',background:'#fff',color:'#d97706',border:'none',borderRadius:10,fontWeight:800,fontSize:13,cursor:'pointer'}}>Lanjut ➔</button>
                        </div>
                    ) : (
                        <button onClick={checkAnswer} style={{width:'100%',padding:'14px',background:'#fff',color:'#d97706',border:'none',borderRadius:14,fontWeight:800,fontSize:14,cursor:'pointer'}}>Kunci Jawaban</button>
                    )}
                </Card>
            );
        }

        // ══════════════════════════════════════════
        //   REUSABLE UI COMPONENTS
        // ══════════════════════════════════════════
        function Card({ children, flash, hardcore, blind }) {
            let bg = 'linear-gradient(135deg, #ffffff 0%, #fcfcff 100%)';
            let border = '1px solid rgba(99,102,241,0.08)';
            let glow = 'card-glow';

            if (hardcore) {
                bg = 'linear-gradient(135deg, #dc2626 0%, #991b1b 100%)';
                border = 'none';
                glow = 'hc-glow';
            } else if (blind) {
                bg = 'linear-gradient(135deg, #d97706 0%, #92400e 100%)';
                border = 'none';
                glow = 'box-shadow: 0 8px 32px rgba(217,119,6,0.15)';
            }

            let flashBg = 'transparent';
            if (flash === 'correct') flashBg = hardcore || blind ? 'rgba(52,211,153,0.3)' : 'rgba(209,250,229,0.7)';
            if (flash === 'wrong') flashBg = hardcore || blind ? 'rgba(248,113,113,0.4)' : 'rgba(254,226,226,0.7)';

            return (
                <div className={`pop-in ${glow}`} style={{
                    background: bg, border: border, borderRadius: 24, padding: '24px 20px',
                    position: 'relative', overflow: 'hidden', transition: 'all 0.3s'
                }}>
                    {flash && (
                        <div style={{
                            position:'absolute', inset:0, background: flashBg, zIndex:10,
                            pointerEvents:'none', backdropFilter: 'blur(1px)', transition:'all 0.2s'
                        }} className="blink" />
                    )}
                    <div style={{ position: 'relative', zIndex: 1 }}>{children}</div>
                </div>
            );
        }

        function Btn({ children, color, onClick, full }) {
            return (
                <button onClick={onClick} style={{
                    width: full ? '100%' : 'auto', padding: '12px 24px', border: 'none',
                    background: color, color: '#fff', borderRadius: 12, fontWeight: 800,
                    fontSize: 13, cursor: 'pointer', boxShadow: `0 4px 12px ${color}33`, transition: 'all 0.15s'
                }} onMouseOver={e=>e.currentTarget.style.transform='translateY(-1px)'} onMouseOut={e=>e.currentTarget.style.transform='none'}>
                    {children}
                </button>
            );
        }

        function WrongList({ items }) {
            if (!items || items.length === 0) return null;
            const unique = [];
            const seen = new Set();
            for (const i of items) {
                if (!seen.has(i.pinyin)) { seen.add(i.pinyin); unique.push(i); }
            }

            return (
                <div style={{marginTop:20}} className="slide-up">
                    <p style={{fontSize:11,fontWeight:800,color:'#ef4444',letterSpacing:1,marginBottom:8,textTransform:'uppercase'}}>⚠️ Evaluasi Salah / Terlewat ({unique.length})</p>
                    <div style={{display:'flex',flexDirection:'column',gap:6}}>
                        {unique.map((w,i) => (
                            <div key={i} style={{background:'rgba(255,255,255,0.7)',backdropFilter:'blur(8px)',borderRadius:12,padding:10,border:'1px solid rgba(239,68,68,0.12)',display:'flex',alignItems:'center',gap:10}}>
                                <span style={{fontSize:24,fontWeight:900,color:'#1e1b4b'}}>{w.hanzi}</span>
                                <div style={{lineHeight:1.2}}>
                                    <span style={{fontSize:13,fontWeight:800,color:'#dc2626',display:'block',fontFamily:'monospace'}}>{w.pinyin}</span>
                                    <span style={{fontSize:11,fontWeight:700,color:'#475569'}}>{w.meaning}</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function FinishScreen({ score, label, color, extra, wrongList, onRetry }) {
            return (
                <div className="slide-up" style={{maxWidth:480,margin:'0 auto'}}>
                    <Card>
                        <div style={{textAlign:'center',padding:'12px 0'}}>
                            <div style={{fontSize:56,marginBottom:6}}>🏁</div>
                            <h2 style={{fontSize:22,fontWeight:900,color:'#1e1b4b',margin:'0 0 4px'}}>{label} Selesai!</h2>
                            <p style={{color:'#94a3b8',fontSize:12,marginBottom:20}}>Hasil akhir kamu</p>
                            <div style={{
                                background:`linear-gradient(135deg,${color}11,${color}08)`,
                                border:`1px solid ${color}22`, borderRadius:20,
                                padding:'20px 16px', marginBottom:16,
                            }} border-color-glow="true">
                                <p style={{fontSize:10,fontWeight:800,color,letterSpacing:2,textTransform:'uppercase',margin:'0 0 4px'}}>Skor Akhir</p>
                                <div style={{fontSize:60,fontWeight:900,color,lineHeight:1}}>\
                                    {score}<span style={{fontSize:20,color:`${color}88`,fontWeight:700}}>/100</span>\
                                </div>
                                {extra && <p style={{fontSize:12,color:'#94a3b8',marginTop:6,fontWeight:600}}>{extra}</p>}\
                            </div>
                            <Btn color={color} onClick={onRetry} full>Ulangi Sesi Ini</Btn>
                        </div>
                    </Card>
                    <WrongList items={wrongList} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
